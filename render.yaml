services:
  - type: web
    name: nayoo-backend
    runtime: python
    plan: free
    region: singapore
    buildCommand: |
      apt-get update && apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libcairo2 libgdk-pixbuf-2.0-0 libffi-dev shared-mime-info
      pip install -r requirements.txt
      python scripts/download_appraisal.py
    startCommand: gunicorn app.main:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: APPRAISAL_DB_URL
        sync: false   # URL ของ appraisal.db บน Github Release
      - key: APPRAISAL_DB_PATH
        value: ./data/appraisal.db
      - key: CORS_ORIGINS
        sync: false
